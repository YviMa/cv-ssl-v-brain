data:
    data_dir: "../data/Algonauts23_shared_Net2Brain"
    stimuli_path: "../data/Algonauts23_shared_Net2Brain/images"
    brain_rdms: "../data/Algonauts23_shared_Net2Brain/brain_data"

model:
    directory: "../data/central_vision_ssl"
    name: "resnet50"
    time_window: 15
    crop_size: 224
    center_crop: True

feature_extraction:
    layers:
        - "backbone.layer1"
        - "backbone.layer2"
        - "backbone.layer3"
        - "backbone.layer4"

analysis:
    rsa:
        execute: True
        distance_metric: "spearman"
    reg: 
        execute: True
        n_folds: 3 # stick to net2brain defaults for now
        n_components: 100
        trn_tst_split: 0.8
        batch_size: 100


