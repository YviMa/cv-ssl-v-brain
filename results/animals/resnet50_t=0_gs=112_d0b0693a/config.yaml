analysis:
  reg:
    batch_size: 100
    execute: true
    n_components: 90
    n_folds: 3
    trn_tst_split: 0.9
  rsa:
    distance_metric: spearman
    execute: true
data:
  brain_rdms: ../../data/Algonauts23_shared_Net2Brain/animals/brain_data/
  category: animals
  data_dir: ../../data/Algonauts23_shared_Net2Brain/animals
  results_dir: results/animals/
  stimuli_path: ../../data/Algonauts23_shared_Net2Brain/animals/images/
feature_extraction:
  layers:
  - backbone.layer1
  - backbone.layer2
  - backbone.layer3
  - backbone.layer4
model:
  center_crop: false
  crop_size: 112
  name: resnet50
  time_window: 0
